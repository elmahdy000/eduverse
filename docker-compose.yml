version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eduvers-postgres
    environment:
      POSTGRES_USER: eduvers
      POSTGRES_PASSWORD: eduvers_dev_password
      POSTGRES_DB: eduvers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduvers"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduvers-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://eduvers:eduvers_dev_password@postgres:5432/eduvers
      JWT_SECRET: your_jwt_secret_change_in_production
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 7d
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eduvers-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
